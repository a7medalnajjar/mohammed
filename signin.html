<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المبرمج المحترف | محمد هنيدي</title>

    <link rel="stylesheet" href="signin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

        <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&family=Reem+Kufi:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>

    <nav id="navbar">
        <div class="nav-container">
            <div class="logo">EGYPT <span class="gold">VISION</span></div>
            <ul class="nav-links">
                <li><a href="Login.html" >تسجيل الدخول</a></li>
                <li><a href="The Future Web Show with Mohamed Ibrahim.html">الرئيسية</a></li>
            </ul>
        </div>
    </nav>

    <div class="login-box">
        <div class="glass-container">
            <form>
                <h2>مرحباً بك</h2>
                <p>سجل دخولك لتجربة فريدة</p>

                <div class="input-box">
                    <i class="fas fa-envelope"></i>
                    <input type="email" required placeholder="البريد الإلكتروني">
                </div>

                <div class="input-box">
                    <i class="fas fa-lock"></i>
                    <input type="password" required placeholder="كلمة المرور">
                </div>

                <div class="remember-forgot">
                    <label><input type="checkbox"> تذكرني</label>
                    <a href="#">نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" class="btn-login">دخول</button>

                <div class="register-link">
                    <p>ليس لديك حساب؟ <a href="LogIn.html">سجل الآن</a></p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
