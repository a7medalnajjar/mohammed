<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرحباً بك في عالم الجمال</title>
    <style>
        /* استيراد خطوط عربية أنيقة */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* خلفية متدرجة بألوان مريحة وفخمة */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            position: relative;
        }

        /* دوائر جمالية في الخلفية لإضافة عمق */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            z-index: 0;
            animation: float 10s infinite alternate;
        }
        body::after {
            bottom: -50px;
            right: -50px;
            background: rgba(255, 255, 255, 0.05);
        }

        @keyframes float {
            from { transform: translateY(0); }
            to { transform: translateY(40px); }
        }

        /* حاوية الترحيب الزجاجية */
        .welcome-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            color: white;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 90%;
            z-index: 1;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, #d1d1d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: #fff;
            color: #764ba2;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s all ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
            background: #f0f0f0;
        }

        /* تفاصيل صغيرة لزيادة الجاذبية */
        .stars {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #ffd700;
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <div class="stars">✨ ✨ ✨</div>
        <h1>أهلاً بك يا مبدع</h1>
        <p>"أهلاً بكم في["مِصرَ الحديثة" (Modern Egypt)].. نبتكر اليوم لنبني معكم مستقبل الغد."</p>
        <a href="The Future Web Show with Mohamed Ibrahim.html" class="btn">ابدأ الرحلة الآن</a>
    </div>

</body>
</html>
