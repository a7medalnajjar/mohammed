    <div class="login-card">
        <div class="logo">
            <i class="fas fa-code"></i>
        </div>
        <h1>مرحباً يا بطل 🚀</h1>
        <p>سجل دخولك إلى لوحة تحكم المبرمج "محمد"</p>

        <form>
            <div class="input-box">
                <i class="fas fa-envelope icon"></i>
                <input type="email" required placeholder=" ">
                <label>البريد الإلكتروني</label>
            </div>

            <div class="input-box">
                <i class="fas fa-lock icon"></i>
                <input type="password" required placeholder=" ">

            </div>

            <div class="options">
                <label><input type="checkbox"> تذكرني</label>
                <a href="https://accounts.firefox.com/">نسيت كلمة السر؟</a>
            </div>

            <button  type="submit" class="btn-login"><li> <a href="The Future Web Show with Mohamed Ibrahim.html" class="main-btn">دخول النظام</a></li></button>
        </form>

        <div class="social-login">
            <p>أو سجل عبر</p>
            <div class="icons">
                <i class="fab fa-google"></i>
                <i class="fab fa-github"></i>
            </div>
        </div>
    </div>
